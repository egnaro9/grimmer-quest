<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0B0B13" />
        <meta name="description" content="Glimmer Quest - Match gems, create combos & climb the leaderboard!" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Glimmer Quest" />
        
        <!-- Favicon and Icons -->
        <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon.svg" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>Glimmer Quest | Match-3 Puzzle Game</title>
        <style>
            html, body { margin: 0; background: #0B0B13; }
            #startup-shell {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0B0B13;
            }
            #startup-shell img {
                position: absolute;
                transition: opacity 0.35s ease;
            }
            #startup-icon {
                width: 120px;
                height: 120px;
                border-radius: 24px;
                opacity: 1;
            }
            #startup-splash {
                max-width: 280px;
                max-height: 80vh;
                opacity: 0;
            }
        </style>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <!-- AdMob/AdSense Ad Placement API for HTML5 Games -->
        <!-- To enable ads: 
             1. Replace YOUR_PUBLISHER_ID with your actual AdSense publisher ID (ca-pub-XXXXXXXX)
             2. Remove data-adbreak-test="on" for production
             3. Uncomment the script tags below
        -->
        <!--
        <script async
            data-adbreak-test="on"
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_PUBLISHER_ID"
            crossorigin="anonymous">
        </script>
        -->
        <script>
            // Initialize ad functions (will be overridden when AdSense loads)
            window.adsbygoogle = window.adsbygoogle || [];
            window.adBreak = window.adConfig = function(o) {
                // Fallback for when AdSense is not loaded
                if (o.adBreakDone) o.adBreakDone({ breakStatus: 'notReady' });
                if (o.adViewed) setTimeout(() => o.adViewed(), 1500);
            };
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root">
            <div id="startup-shell">
                <img id="startup-icon" src="%PUBLIC_URL%/icon-192.png" alt="" />
                <img id="startup-splash" src="%PUBLIC_URL%/splash.png" alt="" />
            </div>
            <script>
                setTimeout(function() {
                    var icon = document.getElementById('startup-icon');
                    var splash = document.getElementById('startup-splash');
                    if (icon) icon.style.opacity = '0';
                    if (splash) splash.style.opacity = '1';
                }, 400);
            </script>
        </div>
        <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    </body>
</html>
